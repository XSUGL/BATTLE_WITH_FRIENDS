<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle With Friend - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="auth-box">
      <h1>Battle With Friend</h1>
      
      <div id="login-form" class="form-container">
        <h2>Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
          <div id="login-error" class="error-message"></div>
        </form>
        <p class="switch-form">
          Don't have an account? <a href="#" id="show-register">Register</a>
        </p>
      </div>
      
      <div id="register-form" class="form-container" style="display: none;">
        <h2>Register</h2>
        <form id="registerForm">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" name="username" required minlength="3" maxlength="50">
            <small>3-50 characters</small>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" name="password" required minlength="8">
            <small>Minimum 8 characters</small>
          </div>
          <button type="submit" class="btn btn-primary">Register</button>
          <div id="register-error" class="error-message"></div>
        </form>
        <p class="switch-form">
          Already have an account? <a href="#" id="show-login">Login</a>
        </p>
      </div>
    </div>
  </div>
  
  <script type="module" src="js/login.js"></script>
</body>
</html>
