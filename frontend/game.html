<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle With Friend - Game</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="score-panel">
        <div class="score-item">
          <span class="player-label player1">You (W A S D)</span>
          <span class="player-score" id="score1">0</span>
        </div>
        <div class="timer" id="timer">3:00</div>
        <div class="score-item">
          <span class="player-label player2">Opponent (Frecce)</span>
          <span class="player-score" id="score2">0</span>
        </div>
      </div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="game-controls">
      <button id="forfeitBtn" class="btn-forfeit">Forfeit (Abbandona)</button>
    </div>
    
    <div id="statusOverlay" class="status-overlay">
      <div class="status-message" id="statusMessage">Connecting...</div>
    </div>
  </div>
  
  <script type="module" src="js/game-client.js"></script>
</body>
</html>
